worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # Increase limits for certificate/template uploads (DOCX + base64 can be large)
    client_max_body_size 20m;

    # Gzip for text assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    upstream app {
        server app:3000;
    }

    # ── HTTP — proxy directo al app (desarrollo / pre-producción sin TLS) ─────
    # Para activar HTTPS en producción:
    #   1. Obtén el certificado:  certbot certonly --webroot -w /var/www/certbot -d tudominio.cl
    #   2. Descomenta el bloque HTTPS de abajo
    #   3. Cambia este bloque para que solo haga return 301 https://$host$request_uri
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Certbot ACME challenge (necesario para obtener el certificado)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade            $http_upgrade;
            proxy_set_header Connection         'upgrade';
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_cache_bypass $http_upgrade;

            # Longer timeout for PDF/certificate generation (LibreOffice can be slow)
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }
    }

    # ── HTTPS — descomentar cuando tengas certificado Let's Encrypt ───────────
    # server {

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # Increase limits for certificate/template uploads (DOCX files can be large)
    client_max_body_size 20m;

    # Gzip for text assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    upstream app {
        server app:3000;
    }

    # HTTP — redirect to HTTPS (or serve directly if TLS is terminated upstream)
    server {
        listen 80;
        server_name _;

        # Certbot ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Uncomment after obtaining a certificate to force HTTPS:
        # return 301 https://$host$request_uri;

        location / {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Longer timeout for PDF/certificate generation
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }
    }

    # HTTPS — enable after obtaining a Let's Encrypt certificate
    # server {
    #     listen 443 ssl;
    #     server_name certify.tudominio.cl;
    #
    #     ssl_certificate     /etc/letsencrypt/live/certify.tudominio.cl/fullchain.pem;

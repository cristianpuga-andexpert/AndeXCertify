services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: andexcertify
      POSTGRES_USER: andex_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U andex_user -d andexcertify"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        VITE_DEV_MODE: ${VITE_DEV_MODE:-false}
        VITE_DEV_USER_ID: ${VITE_DEV_USER_ID:-}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://andex_user:${POSTGRES_PASSWORD:-password}@postgres:5432/andexcertify
      DEV_MODE: ${DEV_MODE:-false}
      DEV_USER_ID: ${DEV_USER_ID:-}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      APP_URL: ${APP_URL:-http://localhost:3000}
      PORT: "3000"
      NODE_ENV: production
    ports:
      - "3001:3000"
    volumes:
      - dev_storage:/app/dev-storage

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro

volumes:
  postgres_data:
  dev_storage:
  certbot_certs:
  certbot_www:

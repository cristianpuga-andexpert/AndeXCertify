services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # No 'ports' mapping: Postgres is reachable only on the internal Docker
    # network (service name 'postgres'), never exposed to the public internet.
    # For local DB access use: docker compose exec postgres psql ...
    environment:
      POSTGRES_DB: andexcertify
      POSTGRES_USER: andex_user
      # Required — compose fails fast if POSTGRES_PASSWORD is unset/empty.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U andex_user -d andexcertify"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    # In production the image is pulled from GHCR (built by CI). `build` is kept
    # for local use (`docker compose up --build`). The deploy pulls the image,
    # so compose uses it instead of rebuilding on the VPS.
    image: ${APP_IMAGE:-ghcr.io/cristianpuga-andexpert/andexcertify:latest}
    build:
      context: .
      args:
        VITE_DEV_MODE: ${VITE_DEV_MODE:-false}
        VITE_DEV_USER_ID: ${VITE_DEV_USER_ID:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://andex_user:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/andexcertify
      DEV_MODE: ${DEV_MODE:-false}
      DEV_USER_ID: ${DEV_USER_ID:-}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      SUPERADMIN_USER_ID: ${SUPERADMIN_USER_ID:-}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      APP_URL: ${APP_URL:-http://localhost:3000}
      BASE_DOMAIN: ${BASE_DOMAIN:?BASE_DOMAIN is required for multi-tenant domains}
      PORT: "3000"
      NODE_ENV: production
    # No public 'ports' mapping: the app is reachable only via the Caddy
    # reverse proxy on the internal network, so it can never be hit directly
    # bypassing TLS. Expose a port here only for local debugging.
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    volumes:
      - dev_storage:/app/dev-storage

  # ── MinIO: S3-compatible object storage (self-hosted) ──────────────────────
  # Not exposed publicly here; reachable only on the internal Docker network and
  # through Caddy at STORAGE_DOMAIN, so browser-facing pre-signed URLs resolve.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
      # Sign/redirect pre-signed URLs against the public storage domain.
      MINIO_SERVER_URL: https://${STORAGE_DOMAIN:?STORAGE_DOMAIN is required}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # One-shot: create the bucket on first boot, then exit.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$S3_ACCESS_KEY_ID $$S3_SECRET_ACCESS_KEY &&
      mc mb --ignore-existing local/$$S3_BUCKET &&
      echo 'Bucket ready:' $$S3_BUCKET
      "
    environment:
      S3_ACCESS_KEY_ID:     ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
      S3_BUCKET:            ${S3_BUCKET:-andexcertify}
    restart: "no"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
      - minio
    ports:
      - "80:80"
      - "443:443"
    environment:
      ACME_EMAIL:     ${ACME_EMAIL:?ACME_EMAIL is required for Let's Encrypt}
      STORAGE_DOMAIN: ${STORAGE_DOMAIN:?STORAGE_DOMAIN is required}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # certificates + ACME account (must persist!)
      - caddy_config:/config

volumes:
  postgres_data:
  dev_storage:
  minio_data:
  caddy_data:
  caddy_config:

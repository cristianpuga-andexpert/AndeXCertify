name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build Docker image and push to ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS via SSH
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      # Plain ssh with a retry loop. The runner→VPS path occasionally times out
      # (transient network, not a VPS firewall — verified open), so we retry.
      - name: Deploy via SSH (with retries)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s\n' "$VPS_SSH_KEY" > deploy_key
          chmod 600 deploy_key

          # Build the remote script (token/user expanded into it on the runner).
          cat > remote.sh <<REMOTE
          set -euo pipefail
          cd /opt/andexcertify
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          docker compose up -d --no-deps --pull always app
          docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile || true
          docker image prune -f
          REMOTE

          for attempt in 1 2 3 4 5; do
            echo "::group::Deploy attempt $attempt"
            if ssh -i deploy_key -p "$VPS_PORT" \
                 -o ConnectTimeout=40 -o ServerAliveInterval=10 \
                 -o StrictHostKeyChecking=accept-new \
                 "$VPS_USER@$VPS_HOST" 'bash -s' < remote.sh; then
              echo "::endgroup::"
              echo "✅ Deploy succeeded on attempt $attempt"
              exit 0
            fi
            echo "::endgroup::"
            echo "⚠️ Attempt $attempt failed; retrying in 20s…"
            sleep 20
          done
          echo "❌ All deploy attempts failed"
          exit 1
